<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>密钥设置</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="credentials">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><span class="brand-kicker">Credentials</span><h1>密钥设置</h1><p>配置交易所 API</p></div>
        <nav class="nav-list">
          <a href="./index.html">总览</a><a href="./market.html">Market Data</a><a href="./signal.html">Strategy Engine</a><a href="./accounts.html">账户切换</a><a href="./credentials.html">密钥设置</a><a href="./strategy.html">策略开关</a><a href="./risk.html">风控配置</a><a href="./logs.html">日志监控</a><a href="./intervene.html">手动干预</a>
        </nav>
      </aside>
      <main class="main-content">
        <section class="hero"><div><span class="eyebrow">Credentials</span><h2>交易所 API 密钥页面</h2><p>单独配置 Binance / OKX 的 API Key、Secret 和 Passphrase。</p></div><div class="hero-stats" id="heroStats"></div></section>
        <section class="panel-grid">
          <article class="panel panel-wide">
            <div class="panel-header"><div><span class="panel-tag">Credentials</span><h3>密钥设置</h3></div><select id="accountSelect" aria-label="切换账户"></select></div>
            <form id="credentialsForm" class="form-grid credentials-grid">
              <label>账户名称<input type="text" name="name" required /></label>
              <label>负责人<input type="text" name="owner" required /></label>
              <label>交易所<select name="exchange"><option value="Binance">Binance</option><option value="OKX">OKX</option></select></label>
              <label>健康状态<input type="text" name="health" required /></label>
              <label>API Key<input type="text" name="apiKey" required /></label>
              <label>API Secret<input type="password" name="apiSecret" required /></label>
              <label>Passphrase<input type="password" name="passphrase" /></label>
              <label>备注<input type="text" name="note" /></label>
              <button type="submit" class="primary-btn">保存密钥配置</button>
            </form>
            <div class="helper-copy" id="credentialsHint"></div>
          </article>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
