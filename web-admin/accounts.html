<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>账户切换</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="accounts">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><span class="brand-kicker">Accounts</span><h1>账户切换</h1><p>查看余额与订单</p></div>
        <nav class="nav-list">
          <a href="./index.html">总览</a><a href="./market.html">Market Data</a><a href="./signal.html">Strategy Engine</a><a href="./accounts.html">账户切换</a><a href="./credentials.html">密钥设置</a><a href="./strategy.html">策略开关</a><a href="./risk.html">风控配置</a><a href="./logs.html">日志监控</a><a href="./intervene.html">手动干预</a>
        </nav>
      </aside>
      <main class="main-content">
        <section class="hero"><div><span class="eyebrow">Accounts</span><h2>多账户页面</h2><p>独立查看 Binance / OKX 账户、余额和最近订单。</p></div><div class="hero-stats" id="heroStats"></div></section>
        <section class="panel-grid">
          <article class="panel panel-wide">
            <div class="panel-header"><div><span class="panel-tag">Accounts</span><h3>多账户切换</h3></div><select id="accountSelect" aria-label="切换账户"></select></div>
            <div class="account-card" id="accountCard"></div>
            <div class="dual-grid">
              <div><div class="section-head"><h4>账户余额</h4></div><div id="balanceList" class="metric-list"></div></div>
              <div><div class="section-head"><h4>最近订单</h4></div><div id="orderList" class="order-list"></div></div>
            </div>
          </article>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
