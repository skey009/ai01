<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Execution Engine</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="execution">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand"><span class="brand-kicker">Module 04</span><h1>Execution Engine</h1><p>交易执行模块</p></div>
        <nav class="nav-list">
          <a href="./index.html">总览</a><a href="./market.html">Market Data</a><a href="./signal.html">Strategy Engine</a><a href="./risk.html">Risk Control</a><a href="./execution.html">Execution Engine</a><a href="./portfolio.html">Portfolio</a><a href="./accounts.html">账户切换</a><a href="./credentials.html">密钥设置</a><a href="./strategy.html">策略开关</a><a href="./logs.html">日志监控</a><a href="./intervene.html">手动干预</a>
        </nav>
      </aside>
      <main class="main-content">
        <section class="hero"><div><span class="eyebrow">Module 04</span><h2>交易执行页面</h2><p>支持市价 / 限价下单、订单状态机展示、失败重试和幂等键防重。</p></div><div class="hero-stats" id="heroStats"></div></section>
        <section class="panel-grid">
          <article class="panel">
            <div class="panel-header"><div><span class="panel-tag">Create</span><h3>创建订单</h3></div><select id="accountSelect" aria-label="切换账户"></select></div>
            <form id="executionForm" class="form-grid">
              <label>交易对<input type="text" name="symbol" value="BTC/USDT" /></label>
              <label>方向<select name="side"><option value="BUY">BUY</option><option value="SELL">SELL</option></select></label>
              <label>订单类型<select name="orderType"><option value="LIMIT">LIMIT</option><option value="MARKET">MARKET</option></select></label>
              <label>数量<input type="number" step="0.0001" name="quantity" value="0.15" /></label>
              <label>价格<input type="number" step="0.01" name="price" value="64350" /></label>
              <label>止损 %<input type="number" step="0.1" name="stopLoss" value="1.9" /></label>
              <label>止盈 %<input type="number" step="0.1" name="takeProfit" value="4.8" /></label>
              <label>Idempotency Key<input type="text" name="idempotencyKey" value="manual-order-001" /></label>
              <button type="submit" class="primary-btn">提交订单</button>
            </form>
          </article>
          <article class="panel">
            <div class="panel-header"><div><span class="panel-tag">State</span><h3>订单状态机</h3></div></div>
            <div id="executionList" class="execution-list"></div>
          </article>
        </section>
      </main>
    </div>
    <div id="toast" class="toast" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
